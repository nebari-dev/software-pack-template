baseURL = "https://packs.nebari.dev/building-a-software-pack/"
languageCode = "en-us"
title = "Building a Software Pack"
enableGitInfo = true

# Theme imported as a Hugo Module, pinned to a release tag in go.mod (currently v0.1.1).
[module]
  [[module.imports]]
    path = "github.com/nebari-dev/nebari-hugo-theme"

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
  [markup.goldmark.renderer]
    unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description = "A deep-dive guide to building, deploying, and maintaining Nebari Software Packs - Kubernetes applications with routing, TLS, and OIDC wired in."
  repo = "https://github.com/nebari-dev/nebari-software-pack-template"
  editBase = "https://github.com/nebari-dev/nebari-software-pack-template/edit/main/docs/site/content"
  search = true

  [[params.tabs]]
    name = "Guide"
    url  = "/"

  [[params.sidebar]]
    heading = "Getting Started"
    [[params.sidebar.items]]
      label = "Introduction"
      url   = "/"
    [[params.sidebar.items]]
      label = "What is a software pack"
      url   = "/what-is-a-software-pack/"
    [[params.sidebar.items]]
      label = "Build your own"
      url   = "/build-your-own/"

  [[params.sidebar]]
    heading = "Reference"
    [[params.sidebar.items]]
      label = "NebariApp CRD"
      url   = "/nebariapp-crd-reference/"
    [[params.sidebar.items]]
      label = "Authentication Flow"
      url   = "/auth-flow/"
    [[params.sidebar.items]]
      label = "Release Readiness"
      url   = "/release-readiness/"
